<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Блокировщик</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        :root {
            /* НАСТРОЙКИ КРУЖКА ДЛЯ КАМЕРЫ */
            --cam-x: 50%;             /* Позиция по горизонтали (50% = по центру) */
            --cam-y: 120px;           /* Позиция по вертикали сверху */
            --cam-radius: 110px;      /* Радиус круга на ПК */
            --cam-radius-mobile: 75px; /* Радиус круга на телефонах */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: transparent; /* Прозрачный фон для OBS */
            overflow: hidden;
            color: white;
        }

        /* Анимация пульсации для текста блокировки */
        @keyframes pulse-red {
            0%, 100% { color: #ff0050; text-shadow: 0 0 10px rgba(255, 0, 80, 0.5); }
            50% { color: #ff4d85; text-shadow: 0 0 20px rgba(255, 0, 80, 0.8); }
        }

        .text-tiktok-red {
            animation: pulse-red 2s infinite;
        }

        /* Прозрачность при нормальном состоянии */
        #normal-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            transition: opacity 0.5s ease;
        }

        /* Черный экран блокировки с вырезом для камеры */
        #blocked-screen {
            position: absolute;
            inset: 0;
            background-color: #000000;
            display: none; /* Скрыт по умолчанию */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.5s ease;
            padding: 20px; /* Отступы по бокам, чтобы текст не прилипал к краям */
            
            /* CSS маска для создания прозрачного круга под вебкамеру */
            -webkit-mask-image: radial-gradient(circle at var(--cam-x) var(--cam-y), transparent var(--cam-radius), black calc(var(--cam-radius) + 1px));
            mask-image: radial-gradient(circle at var(--cam-x) var(--cam-y), transparent var(--cam-radius), black calc(var(--cam-radius) + 1px));
        }
        
        #blocked-screen.active {
            display: flex;
            opacity: 1;
        }

        /* Адаптация под телефоны */
        @media (max-width: 640px) {
            #blocked-screen {
                padding-top: 160px; /* Сдвигаем контент ниже кружка */
                -webkit-mask-image: radial-gradient(circle at var(--cam-x) 90px, transparent var(--cam-radius-mobile), black calc(var(--cam-radius-mobile) + 1px));
                mask-image: radial-gradient(circle at var(--cam-x) 90px, transparent var(--cam-radius-mobile), black calc(var(--cam-radius-mobile) + 1px));
            }
        }
        
        @media (min-width: 641px) {
            #blocked-screen {
                padding-top: 220px; /* Сдвигаем контент ниже кружка для больших экранов */
            }
        }

        /* Панель для тестирования (скрыта в OBS, видна при наведении мышкой) */
        #debug-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        #debug-panel:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Экран обычной трансляции (прозрачный) -->
    <div id="normal-screen">
        <!-- Спонсоры убраны по запросу -->
    </div>

    <!-- Черный экран блокировки -->
    <div id="blocked-screen">
        <!-- Изменил размеры текста: для телефонов text-4xl, для ПК text-8xl. Добавлено px-4 для отступов -->
        <h1 class="text-4xl sm:text-6xl md:text-8xl font-black mb-4 sm:mb-6 text-tiktok-red uppercase tracking-wider text-center break-words w-full px-4">
            Просмотр<br>Заблокирован
        </h1>
        
        <p class="text-xl sm:text-2xl md:text-3xl font-bold mb-6 sm:mb-8 text-center text-gray-300 px-4">
            Для продолжения пополните на <span class="text-[#00f2fe] text-3xl sm:text-4xl">300</span> монет
        </p>
        
        <div class="bg-gray-800 rounded-full w-full sm:w-3/4 max-w-2xl h-10 sm:h-12 relative overflow-hidden mb-4 border-2 border-gray-600">
            <div id="progress-bar" class="bg-gradient-to-r from-[#ff0050] to-[#00f2fe] h-full w-0 transition-all duration-500 ease-out"></div>
            <div class="absolute inset-0 flex items-center justify-center font-bold text-lg sm:text-xl drop-shadow-md">
                Осталось: <span id="coins-left" class="ml-2 text-xl sm:text-2xl">300</span>
            </div>
        </div>
        
        <div class="mt-4 sm:mt-8 text-gray-400 text-base sm:text-lg text-center px-4">
            Отправляйте подарки, чтобы разблокировать экран!
        </div>
        
        <!-- Мини-список тех, кто уже скинул во время блокировки -->
        <div id="current-donors" class="mt-6 flex flex-wrap gap-2 justify-center max-w-3xl w-full px-2">
            <!-- Доноры будут появляться здесь -->
        </div>
    </div>

    <!-- Дебаг панель (для тестирования) -->
    <div id="debug-panel">
        <div class="text-xs text-gray-400 mb-2">DEBUG PANEL (Наведите)</div>
        <div class="text-white mb-2">Таймер до блокировки: <span id="debug-timer">900</span> сек.</div>
        <button onclick="app.triggerBlock()" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-sm mr-2">Заблокировать</button>
        <button onclick="app.simulateGift()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-sm mt-2">Симулировать донат</button>
    </div>

    <script>
        // === ОСНОВНАЯ ЛОГИКА ПРИЛОЖЕНИЯ ===
        const app = {
            // Настройки
            BLOCK_INTERVAL_SEC: 15 * 60, // 15 минут в секундах
            GOAL_AMOUNT: 300,            // Цель в монетах для разблокировки
            
            // Состояние
            isBlocked: false,
            timeLeft: 15 * 60,
            coinsNeeded: 300,
            currentSponsors: {},         // Спонсоры текущей блокировки
            timerInterval: null,
            socket: null,

            // Элементы DOM
            elBlockedScreen: document.getElementById('blocked-screen'),
            elCoinsLeft: document.getElementById('coins-left'),
            elProgressBar: document.getElementById('progress-bar'),
            elCurrentDonors: document.getElementById('current-donors'),
            elDebugTimer: document.getElementById('debug-timer'),

            init() {
                const urlParams = new URLSearchParams(window.location.search);
                const username = urlParams.get('user');
                
                if (!username) {
                    // Для локального теста, если забыли добавить ?user=
                    console.warn("Юзернейм не указан! Работает в режиме симуляции.");
                } else {
                    console.log(`Инициализация для пользователя: ${username}`);
                }

                this.resetTimer();
                this.startTimer();
                
                if (username) {
                    this.connectToServer(username);
                }
            },

            startTimer() {
                if (this.timerInterval) clearInterval(this.timerInterval);
                
                this.timerInterval = setInterval(() => {
                    if (!this.isBlocked) {
                        this.timeLeft--;
                        this.elDebugTimer.innerText = this.timeLeft;
                        
                        if (this.timeLeft <= 0) {
                            this.triggerBlock();
                        }
                    }
                }, 1000);
            },

            resetTimer() {
                this.timeLeft = this.BLOCK_INTERVAL_SEC;
                this.elDebugTimer.innerText = this.timeLeft;
            },

            triggerBlock() {
                this.isBlocked = true;
                this.coinsNeeded = this.GOAL_AMOUNT;
                this.currentSponsors = {}; // Очищаем список для новых сборов
                
                // Обновляем UI
                this.updateBlockUI();
                this.elCurrentDonors.innerHTML = '';
                this.elBlockedScreen.classList.add('active');
            },

            unblock() {
                this.isBlocked = false;
                this.elBlockedScreen.classList.remove('active');
                // Спонсоры больше не показываются снизу, сразу сбрасываем таймер
                this.resetTimer();
            },

            handleGift(nickname, amount) {
                if (!this.isBlocked) return;

                this.coinsNeeded = Math.max(0, this.coinsNeeded - amount);
                
                if (this.currentSponsors[nickname]) {
                    this.currentSponsors[nickname] += amount;
                } else {
                    this.currentSponsors[nickname] = amount;
                }

                this.updateBlockUI();

                if (this.coinsNeeded <= 0) {
                    setTimeout(() => this.unblock(), 1000); // 1 сек задержка для красоты
                }
            },

            updateBlockUI() {
                this.elCoinsLeft.innerText = this.coinsNeeded;
                
                const collected = this.GOAL_AMOUNT - this.coinsNeeded;
                const percent = Math.min(100, (collected / this.GOAL_AMOUNT) * 100);
                this.elProgressBar.style.width = `${percent}%`;

                this.elCurrentDonors.innerHTML = Object.entries(this.currentSponsors)
                    .map(([name, amount]) => `
                        <span class="bg-gray-700 px-3 py-1 rounded-full text-sm font-semibold border border-gray-500 shadow-sm text-white">
                            ${name}: <span class="text-[#00f2fe]">${amount}</span>
                        </span>
                    `).join('');
            },

            connectToServer(username) {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}`;
                
                console.log(`Подключение к ${wsUrl}...`);
                this.socket = new WebSocket(wsUrl);

                this.socket.onopen = () => {
                    console.log('Подключено к WebSocket. Передаем юзернейм:', username);
                    this.socket.send(JSON.stringify({ type: 'set_user', username: username }));
                };

                this.socket.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'gift') {
                        this.handleGift(data.nickname, data.diamondCount);
                    } else if (data.type === 'connected') {
                        console.log('Сервер успешно подключился к стриму TikTok!');
                    } else if (data.type === 'error') {
                        console.error('Ошибка от сервера:', data.message);
                    }
                };

                this.socket.onclose = () => {
                    console.log('Соединение потеряно. Переподключение через 5 секунд...');
                    setTimeout(() => this.connectToServer(username), 5000);
                };
            },

            simulateGift() {
                this.handleGift('TestUser', 50);
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
